<!doctype html>
<html lang="en" >

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barcelona Explore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="position-relative">


    <!-- navbar -->
    <div class="container-custom">
        <nav class="navbar navbar-expand-lg bg-body-tertiary bg-white py-3" data-bs-theme="">
            <div class="container-fluid ">
                <a class="navbar-brand text-red fw-bold" href="">Barcelona Explore</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">

                        <li class="nav-item">
                            <a class="nav-link fw-bold" aria-current="page" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-bold" href="#">Contact</a>
                        </li>


                    </ul>
                </div>

                <form class="d-flex align-items-center justify-content-centers d-none d-md-flex" role="search">
                    <input id="search" class="form-control me-2 text-center" type="search" placeholder="Search in the city"/>
                    <i id="submit" class="fa-solid fa-magnifying-glass"></i>
                </form>

            </div>
        </nav>
    </div>
    <!-- maps -->

    <div class="container-fluid">
        <div class="row">
            <div class="col-12 p-0 m-0">
                <div id="map"></div>
            </div>
        </div>
    </div>




    <!-- categories -->

    <div class="container-fluid elements-container">
        <div class="custom-row-menu" id="wrapper-categories">
            <div href="" class="custom-tag"><i><i class="fa-solid fa-utensils"></i></i>Example</div>
            <div href="" class="custom-tag"><i><i class="fa-solid fa-utensils"></i></i>Example</div>
            <div href="" class="custom-tag"><i><i class="fa-solid fa-utensils"></i></i>Example</div>
            <div href="" class="custom-tag"><i><i class="fa-solid fa-utensils"></i></i>Example</div>
        </div>
    </div>



    <script src="https://kit.fontawesome.com/59fb79117f.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>

</html>
